<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <rect width="1600" height="900" fill="#0c0a09"/>
  <!-- circular plaza -->
  <circle cx="800" cy="500" r="280" fill="#1c1917" stroke="#3a322c" stroke-width="3"/>
  <circle cx="800" cy="500" r="200" fill="#14110f" stroke="#3a322c"/>
  <!-- fountain -->
  <circle cx="800" cy="500" r="80" fill="#292524" stroke="#c8a14a"/>
  <circle cx="800" cy="500" r="40" fill="#3a322c"/>
  <!-- hedges -->
  <g fill="#2a3a24">
    <rect x="320" y="380" width="40" height="240" rx="6"/>
    <rect x="1240" y="380" width="40" height="240" rx="6"/>
    <rect x="780" y="120" width="40" height="200" rx="6"/>
    <rect x="780" y="680" width="40" height="200" rx="6"/>
  </g>
  <text x="800" y="860" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#5d564d">The Emerald Garden · plaza</text>
</svg>
