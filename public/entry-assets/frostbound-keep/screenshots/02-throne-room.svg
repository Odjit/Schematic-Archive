<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="lamp" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#c8a14a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0c0a09" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="#0c0a09"/>
  <!-- floor perspective -->
  <polygon points="0,900 1600,900 1100,500 500,500" fill="#1c1917"/>
  <!-- columns -->
  <g fill="#292524">
    <rect x="380" y="200" width="60" height="500"/>
    <rect x="1160" y="200" width="60" height="500"/>
    <rect x="540" y="220" width="44" height="480"/>
    <rect x="1016" y="220" width="44" height="480"/>
  </g>
  <!-- throne dais -->
  <polygon points="640,700 960,700 880,500 720,500" fill="#3a322c"/>
  <rect x="720" y="380" width="160" height="200" fill="#292524"/>
  <polygon points="720,380 800,300 880,380" fill="#c8a14a" opacity="0.6"/>
  <!-- lamp glow -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#lamp)"/>
  <text x="800" y="850" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#5d564d">Frostbound Keep · throne room</text>
</svg>
