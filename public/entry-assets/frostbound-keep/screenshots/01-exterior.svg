<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0a09"/>
      <stop offset="1" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2421"/>
      <stop offset="1" stop-color="#14110f"/>
    </linearGradient>
    <pattern id="snow" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#cfc6b8" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#snow)"/>
  <!-- distant towers -->
  <g fill="#1c1917" stroke="#3a322c">
    <rect x="200" y="380" width="160" height="380"/>
    <polygon points="200,380 280,260 360,380"/>
    <rect x="1240" y="380" width="160" height="380"/>
    <polygon points="1240,380 1320,260 1400,380"/>
  </g>
  <!-- central keep -->
  <g fill="#292524" stroke="#3a322c" stroke-width="2">
    <rect x="540" y="320" width="520" height="440"/>
    <polygon points="540,320 800,180 1060,320"/>
    <rect x="780" y="540" width="40" height="220" fill="#0c0a09"/>
    <rect x="600" y="440" width="60" height="80" fill="#0c0a09"/>
    <rect x="940" y="440" width="60" height="80" fill="#0c0a09"/>
  </g>
  <!-- moonlight -->
  <circle cx="1300" cy="180" r="60" fill="#c8a14a" opacity="0.4"/>
  <circle cx="1300" cy="180" r="40" fill="#c8a14a" opacity="0.5"/>
  <!-- ground -->
  <rect x="0" y="760" width="1600" height="140" fill="url(#ground)"/>
  <!-- watermark -->
  <text x="800" y="850" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#5d564d">Frostbound Keep · placeholder exterior</text>
</svg>
